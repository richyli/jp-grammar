<script>
window.__LOAD_ERRORS__ = [];
window.addEventListener('error', function (e) {
  var src = e.filename || '';
  var tgtSrc = (e.target && e.target.src) ? e.target.src : '';
  // 測驗檔尚未逐章補齊前，其 404 不算錯誤（頁面會優雅降級）
  if (src.indexOf('/quiz/') !== -1 || tgtSrc.indexOf('/quiz/') !== -1) return;
  if (!src && tgtSrc) { window.__LOAD_ERRORS__.push('missing:' + tgtSrc.split('/').pop()); return; }
  window.__LOAD_ERRORS__.push((src.split('/').pop() || 'inline') + ':' + (e.lineno || '?') + ' ' + (e.message || 'error'));
}, true);
</script>
